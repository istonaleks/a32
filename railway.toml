# railway.toml
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --timeout 120 --log-level debug 2>/tmp/gunicorn.log; cat /tmp/gunicorn.log"
healthcheckPath = "/admin/login/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
