# railway.toml
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python manage.py check 2>&1 && python manage.py migrate --noinput 2>&1 && gunicorn core.asgi:application -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --access-logfile - --error-logfile - --log-level debug"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 1